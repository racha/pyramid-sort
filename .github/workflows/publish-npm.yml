# Publishes to https://www.npmjs.com/package/pyramid-sort
#
# Setup (one-time):
# 1. npmjs.com → Access Tokens → Generate New Token → Granular Token
#    - Permissions: Read and write, Packages only, pyramid-sort
#    - Or "Automation" for classic bypass of 2FA on publish
# 2. GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#    - Name: NPM_TOKEN   Value: the token (starts with npm_)
#
# Then either push a semver tag (v1.2.3), or run this workflow manually (Actions tab).

name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
